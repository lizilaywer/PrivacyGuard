<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 深色模式渐变 -->
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#172554;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- 背景 - 圆角矩形 -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" 
        fill="url(#darkGradient)" filter="url(#shadow)"/>
  
  <!-- PG 文字 - 大号 -->
  <text x="512" y="580" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif" 
        font-size="480" 
        font-weight="700" 
        fill="#FFFFFF" 
        text-anchor="middle" 
        dominant-baseline="middle">PG</text>
</svg>
